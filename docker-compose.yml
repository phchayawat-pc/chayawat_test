version: "3.1"
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password1
    volumes:
      - "pgdatas:/var/lib/postgresql/data"
    ports:
      - 5432:5432

  pgadmin:
    image: dpage/pgadmin4:7.8
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: password1
    ports:
      - "20000:80"

  redis-cache:
    image: redis:7.2-alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdatas: